<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أكاديمية أساس التعليمية</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>أكاديمية أساس التعليمية</h1>

    <div class="lang">
        <button onclick="setLang('ar')">AR</button>
        <button onclick="setLang('fr')">FR</button>
        <button onclick="setLang('en')">EN</button>
    </div>
</header>

<section class="hero">
    <h2 data-i18n="title">دروس دعم حضورية وأونلاين</h2>
    <p data-i18n="desc">تعليم احترافي لجميع المستويات</p>
</section>

<section class="form-section">

<h2 data-i18n="register">التسجيل</h2>

<form id="form">

<input type="text" id="name" placeholder="الاسم" required>
<input type="text" id="lastname" placeholder="اللقب" required>
<input type="tel" id="phone" placeholder="رقم الهاتف" required>
<input type="email" id="email" placeholder="البريد الإلكتروني" required>

<select id="level">
<option>ابتدائي</option>
<option>متوسط</option>
<option>ثانوي</option>
<option>جامعي</option>
</select>

<select id="type">
<option>حضوري</option>
<option>أونلاين</option>
</select>

<select id="subject">
<option>العربية</option>
<option>الإنجليزية</option>
<option>الفرنسية</option>
<option>الرياضيات</option>
<option>الإعلام الآلي</option>
</select>

<textarea id="note" placeholder="ملاحظات"></textarea>

<button type="submit">إرسال</button>

</form>

<p id="msg"></p>

</section>

<section class="admin">
<h2>📊 الطلبات</h2>
<div id="orders"></div>
</section>

<script src="script.js"></script>

</body>
</html>
